name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  LOG_LEVEL: "info"

on:
  push:
    branches: [dev, refactor/structure-and-swift6]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Swift 6.2)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"
      - name: Build library
        run: swift build
      - name: Build tests
        run: swift build --build-tests

  integration-tests:
    name: Integration Tests (${{ matrix.sqlserver-version }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        sqlserver-version: ["2008R2", "2012", "2014", "2016", "2017-latest", "2019-latest", "2022-latest", "2025-latest"]
    steps:
      - uses: actions/checkout@v5
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"
      - name: Run tests against SQL Server matrix
        env:
          USE_DOCKER: "1"
          TDS_DOCKER_PORT: "14331"
          TDS_VERSION: ${{ matrix.sqlserver-version }}
          TDS_LOAD_ADVENTUREWORKS: "1"
          TDS_AW_DATABASE: "AdventureWorks"
        run: swift test
