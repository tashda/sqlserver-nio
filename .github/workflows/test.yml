name: "Developer Workflow: Integration & Validation"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  LOG_LEVEL: "info"

on:
  push:
    branches: [dev, refactor/structure-and-swift6]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Step 1: Compilation Check (Swift 6.2)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6"
          skip-verify-signature: true
      - name: Build library
        run: swift build
      - name: Build tests
        run: swift build --build-tests

  smoke-tests:
    name: "Step 2: Rapid Functional Validation (SQL 2022)"
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.base_ref != 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6"
          skip-verify-signature: true
      - name: Run tests against SQL Server 2022
        env:
          USE_DOCKER: "1"
          TDS_DOCKER_PORT: "14331"
          TDS_VERSION: "2022-latest"
          TDS_LOAD_ADVENTUREWORKS: "1"
          TDS_AW_DATABASE: "AdventureWorks"
        run: swift test

  matrix-tests:
    name: "Step 3: Compatibility - ${{ matrix.name }}"
    needs: build
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Legacy Support (SQL 2008 R2)"
            version: "2008R2"
          - name: "Legacy Support (SQL 2012)"
            version: "2012"
          - name: "Legacy Support (SQL 2014)"
            version: "2014"
          - name: "Standard Enterprise (SQL 2016)"
            version: "2016"
          - name: "Standard Enterprise (SQL 2017)"
            version: "2017-latest"
          - name: "Modern Features (SQL 2019)"
            version: "2019-latest"
          - name: "Modern Features (SQL 2022)"
            version: "2022-latest"
          - name: "Edge / Next-Gen (SQL 2025)"
            version: "2025-latest"
    steps:
      - uses: actions/checkout@v5
      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6"
          skip-verify-signature: true
      - name: Run tests against SQL Server ${{ matrix.version }}
        env:
          USE_DOCKER: "1"
          TDS_DOCKER_PORT: "14331"
          TDS_VERSION: ${{ matrix.version }}
          TDS_LOAD_ADVENTUREWORKS: "1"
          TDS_AW_DATABASE: "AdventureWorks"
        run: swift test
