name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Linux Swift 6.0)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Build library
        run: swift build
      - name: Build tests
        run: swift build --build-tests

  unit-tests:
    name: TDS Protocol Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Run TDS unit tests
        run: swift test --filter SQLServerTDSTests

  integration-smoke:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: YourStrong!Passw0rd
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Run connection and core tests
        env:
          TDS_HOSTNAME: 127.0.0.1
          TDS_PORT: "1433"
          TDS_DATABASE: master
          TDS_USERNAME: sa
          TDS_PASSWORD: "YourStrong!Passw0rd"
          TDS_ENABLE_AGENT_TESTS: "0"
        run: |
          # Hard 5-minute process timeout so tests can never stall the pipeline
          timeout 300 swift test --filter 'SQLServerConnectionTests|CoreTests' || {
            exit_code=$?
            if [ $exit_code -eq 124 ]; then
              echo "::error::Tests timed out after 5 minutes"
            fi
            exit $exit_code
          }
